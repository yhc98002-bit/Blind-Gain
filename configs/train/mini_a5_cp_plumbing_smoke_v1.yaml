data:
  train_files: data/mini_a5_plumbing_val_v1.jsonl
  val_files: data/mini_a5_plumbing_val_v1.jsonl
  prompt_key: problem
  answer_key: answer
  image_key: images
  video_key: videos
  image_dir: null
  video_fps: 2.0
  max_prompt_length: 2048
  max_response_length: 2048
  rollout_batch_size: 16
  mini_rollout_batch_size: null
  val_batch_size: 48
  format_prompt: /XYFS02/HDD_POOL/paratera_xy/pxy1289/HaocunYe/Research/BlindGain/artifacts/repos/EasyR1/examples/format_prompt/r1v.jinja
  override_chat_template: null
  shuffle: false
  seed: 20260716
  min_pixels: 262144
  max_pixels: 4194304
  filter_overlong_prompts: false
  image_condition: real
  image_condition_seed: 20260716
  caption_store_paths: []
algorithm:
  adv_estimator: grpo
  disable_kl: false
  use_kl_loss: true
  kl_penalty: low_var_kl
  kl_coef: 0.01
  online_filtering: false
  filter_key: overall
  filter_low: 0.01
  filter_high: 0.99
  pair_group_mode: joint
worker:
  actor:
    global_batch_size: 16
    micro_batch_size_per_device_for_update: 1
    micro_batch_size_per_device_for_experience: 2
    max_grad_norm: 1.0
    padding_free: false
    dynamic_batching: true
    ulysses_size: 1
    model:
      model_path: /XYFS02/HDD_POOL/paratera_xy/pxy1289/HaocunYe/Research/BlindGain/artifacts/models/Qwen/Qwen2.5-VL-3B-Instruct
      enable_gradient_checkpointing: true
      trust_remote_code: true
      freeze_vision_tower: true
      lora:
        rank: 0
        alpha: 64
        target_modules: all-linear
        exclude_modules: .*visual.*
    optim:
      lr: 1.0e-06
      weight_decay: 0.01
      strategy: adamw
      lr_warmup_ratio: 0.0
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true
    offload:
      offload_params: true
      offload_optimizer: true
  rollout:
    n: 5
    temperature: 1.0
    top_p: 1.0
    limit_images: 0
    gpu_memory_utilization: 0.6
    enforce_eager: false
    enable_chunked_prefill: false
    tensor_parallel_size: 1
    disable_tqdm: false
    val_override_config:
      temperature: 0.0
      top_p: 1.0
      n: 1
  ref:
    padding_free: false
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: true
      enable_rank0_init: true
    offload:
      offload_params: false
  reward:
    reward_function: /XYFS02/HDD_POOL/paratera_xy/pxy1289/HaocunYe/Research/BlindGain/src/rewards/cp_grpo_reward.py:compute_score
    reward_function_kwargs:
      symbolic_grader_timeout_seconds: 5.0
trainer:
  total_epochs: 1
  max_steps: 1
  project_name: blind_gains_mini_a5_smoke
  experiment_name: mini_a5_cp_plumbing_smoke_v1
  logger:
  - file
  nnodes: 1
  n_gpus_per_node: 8
  max_try_make_batch: 20
  val_freq: 0
  val_before_train: false
  val_only: false
  val_generations_to_log: 0
  save_freq: 1
  save_limit: -1
  save_model_only: true
  save_checkpoint_path: /XYFS02/HDD_POOL/paratera_xy/pxy1289/HaocunYe/Research/BlindGain/checkpoints/smoke/mini_a5_cp_plumbing_smoke_v1
  load_checkpoint_path: null
  find_last_checkpoint: false
